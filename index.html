<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소프트힐스 홈페이지 방문 유입 현황</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3f0;--surface:#fff;--surface2:#f9f8f6;
  --border:rgba(0,0,0,.07);--border-med:rgba(0,0,0,.12);
  --text-primary:#181816;--text-secondary:#6b6a66;--text-muted:#a09f9a;
  --blue:#2b7cd3;--blue-light:#e8f2fc;
  --green:#16906a;--green-light:#e0f5ed;
  --red:#c0392b;--red-light:#fdecea;
  --amber:#d97706;--purple:#6d5ae0;
  --sidebar-w:216px;
  --header-h:54px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Pretendard',sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:10px}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.logo{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:9px;margin-bottom:2px}
.logo-icon{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-icon i{font-size:15px;color:#fff}
.logo-name{font-size:13px;font-weight:700;letter-spacing:-.2px}
.logo-sub{font-size:11px;color:var(--text-muted);margin-left:37px}
.nav-label{padding:16px 16px 5px;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text-secondary);transition:background .12s,color .12s;user-select:none}
.nav-item:hover{background:var(--bg)}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.nav-item i{font-size:15px;flex-shrink:0;opacity:.7}
.nav-item.active i{opacity:1}
.nav-dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--green)}
.sidebar-footer{margin-top:auto;padding:12px 10px 16px;border-top:1px solid var(--border)}
.add-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.add-btn:hover{background:#1e6bbf}
.add-btn i{font-size:15px}

/* MAIN */
.main{margin-left:var(--sidebar-w);padding:28px 30px 60px;max-width:calc(100vw - var(--sidebar-w))}
.page-header{margin-bottom:22px}
.page-title{font-size:19px;font-weight:700;letter-spacing:-.3px}
.page-meta{font-size:13px;color:var(--text-secondary);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.meta-sep{color:var(--text-muted)}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px 18px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:11px 11px 0 0}
.kpi.blue::before{background:var(--blue)}.kpi.green::before{background:var(--green)}
.kpi.amber::before{background:var(--amber)}.kpi.purple::before{background:var(--purple)}
.kpi-label{font-size:11.5px;color:var(--text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.kpi-label i{font-size:14px}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1}
.kpi-sub{font-size:11.5px;margin-top:6px;display:flex;align-items:center;gap:3px}
.up{color:var(--green)}.dn{color:var(--red)}.muted{color:var(--text-muted)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:6px}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.card-title i{font-size:15px;color:var(--text-muted)}
.card-note{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;margin-bottom:14px}
.g1{margin-bottom:14px}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:var(--text-secondary);margin-bottom:10px}
.ldot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0;vertical-align:middle;margin-right:4px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:11px;font-weight:600;color:var(--text-muted);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border-med);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2)}
.tbl td.num{text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap}
.b-up{background:var(--green-light);color:var(--green)}
.b-dn{background:var(--red-light);color:var(--red)}
.b-nt{background:var(--bg);color:var(--text-secondary)}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:3px;width:fit-content}
.tab{font-size:12px;font-weight:500;padding:5px 14px;border:none;background:transparent;border-radius:6px;color:var(--text-secondary);cursor:pointer;transition:all .12s}
.tab.active{background:var(--surface);color:var(--text-primary);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-canvas{position:relative;flex-shrink:0}
.donut-canvas canvas{display:block}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-val{font-size:18px;font-weight:700;line-height:1}
.donut-center-lbl{font-size:10px;color:var(--text-muted);margin-top:3px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:7px;font-size:12px}
.donut-row{display:flex;align-items:center;gap:7px}
.donut-row-bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.donut-row-fill{height:100%;border-radius:2px}
.donut-row-pct{font-size:11px;color:var(--text-secondary);min-width:32px;text-align:right}
.donut-row-name{color:var(--text-primary);min-width:80px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:26px 28px;width:min(640px,95vw);margin-bottom:40px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted);line-height:1;padding:2px}
.modal-close:hover{color:var(--text-primary)}
.edit-banner{background:var(--blue-light);border:1px solid rgba(43,124,211,.2);border-radius:8px;padding:9px 14px;margin-bottom:16px;font-size:12.5px;color:var(--blue);display:flex;align-items:center;gap:7px}
.fsec{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.07em;text-transform:uppercase;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fgroup{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:11.5px;font-weight:500;color:var(--text-secondary)}
.finput{padding:8px 11px;border:1px solid var(--border-med);border-radius:7px;font-size:13px;color:var(--text-primary);background:var(--surface);outline:none;transition:border-color .15s;width:100%}
.finput:focus{border-color:var(--blue)}
.finput.we{border-color:rgba(200,80,50,.3)}
.daily-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.daily-cell{display:flex;flex-direction:column;gap:2px}
.daily-cell label{font-size:10px;text-align:center;color:var(--text-muted)}
.daily-cell input{padding:5px 3px;border:1px solid var(--border-med);border-radius:5px;font-size:11px;text-align:center;width:100%;outline:none}
.daily-cell input:focus{border-color:var(--blue)}
.btn-row{display:flex;justify-content:flex-end;gap:8px;margin-top:22px}
.btn-primary{padding:9px 22px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#1e6bbf}
.btn-ghost{padding:9px 18px;background:transparent;color:var(--text-secondary);border:1px solid var(--border-med);border-radius:8px;font-size:13px;cursor:pointer}


/* INSIGHT */
.insight-card{background:linear-gradient(135deg,#1a1f35 0%,#0f1729 100%);border:1px solid rgba(43,124,211,.25);border-radius:12px;padding:20px 24px;margin-bottom:14px;position:relative;overflow:hidden}
.insight-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#2b7cd3,#6d5ae0,#1D9E75);border-radius:12px 12px 0 0}
.insight-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.insight-title{font-size:13px;font-weight:600;color:#e8eaf0;display:flex;align-items:center;gap:7px}
.insight-title i{font-size:15px;color:#6d9eeb}
.insight-refresh{display:flex;align-items:center;gap:6px;padding:5px 13px;background:rgba(43,124,211,.15);border:1px solid rgba(43,124,211,.3);border-radius:7px;font-size:12px;color:#6d9eeb;cursor:pointer;transition:all .15s;white-space:nowrap}
.insight-refresh:hover{background:rgba(43,124,211,.28);border-color:rgba(43,124,211,.5)}
.insight-refresh i{font-size:13px}
.insight-refresh.spinning i{animation:_spin .7s linear infinite}
.insight-list{display:flex;flex-direction:column;gap:10px}
.insight-item{display:flex;gap:12px;align-items:flex-start}
.insight-num{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.insight-num.n1{background:rgba(43,124,211,.25);color:#6d9eeb}
.insight-num.n2{background:rgba(109,90,224,.25);color:#a89be8}
.insight-num.n3{background:rgba(29,158,117,.25);color:#4ecda0}
.insight-num.n4{background:rgba(217,119,6,.22);color:#f5b942}
.insight-num.n5{background:rgba(192,57,43,.2);color:#e07060}
.insight-body{flex:1}
.insight-body strong{display:block;font-size:13px;font-weight:600;color:#e8eaf0;line-height:1.4;margin-bottom:3px}
.insight-body span{font-size:12px;color:#8892a4;line-height:1.5}
.insight-skeleton{display:flex;flex-direction:column;gap:10px}
.insight-skel-row{display:flex;gap:12px;align-items:flex-start}
.insight-skel-num{width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.07);flex-shrink:0}
.insight-skel-body{flex:1;display:flex;flex-direction:column;gap:6px}
.insight-skel-title{height:14px;border-radius:4px;background:rgba(255,255,255,.08);width:65%}
.insight-skel-desc{height:12px;border-radius:4px;background:rgba(255,255,255,.05);width:90%}
@keyframes skel-pulse{0%,100%{opacity:.6}50%{opacity:1}}
.insight-skeleton *{animation:skel-pulse 1.4s ease-in-out infinite}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* TREND SECTION */
.sidebar-menu{display:flex;flex-direction:column;flex:1;overflow-y:auto}
.sidebar-hamburger{display:none}
.sidebar-trend-menu{padding:8px 0 4px;border-top:1px solid var(--border);margin-top:4px}
.trend-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.trend-kpi{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
.trend-kpi-label{font-size:11px;color:var(--text-muted);margin-bottom:5px}
.trend-kpi-val{font-size:20px;font-weight:700;letter-spacing:-.3px}
.trend-kpi-sub{font-size:11px;margin-top:4px;color:var(--text-muted)}
@media(max-width:960px){.trend-kpi-row{grid-template-columns:repeat(2,1fr)}}

/* SPIN */
@keyframes _spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════════════
   반응형 — 모바일/태블릿
══════════════════════════════════════ */

/* 태블릿 (960px 이하) */
@media(max-width:960px){
  :root{ --sidebar-w:200px; }
  .kpi-grid{ grid-template-columns:repeat(2,1fr); }
  .trend-kpi-row{ grid-template-columns:repeat(2,1fr); }
  .g2,.g3{ grid-template-columns:1fr; }
}

/* 모바일 (720px 이하) */
@media(max-width:720px){
  :root{ --sidebar-w:0px; }

  /* 사이드바: 상단 고정 헤더로 전환 */
  .sidebar{
    position:fixed; top:0; left:0; right:0;
    width:100%; height:auto;
    flex-direction:row; align-items:center;
    flex-wrap:wrap;
    border-right:none; border-bottom:1px solid var(--border);
    z-index:200; overflow:visible;
    padding:0;
  }
  .logo{
    padding:10px 14px; border-bottom:none;
    border-right:1px solid var(--border);
    flex-shrink:0;
  }
  .logo-sub{ display:none; }
  .logo-mark{ margin-bottom:0; }

  /* 햄버거 버튼 */
  .sidebar-hamburger{
    display:flex; align-items:center; justify-content:center;
    width:40px; height:40px; margin-left:auto; margin-right:8px;
    border:none; background:transparent; cursor:pointer;
    color:var(--text-secondary); font-size:22px; flex-shrink:0;
  }

  /* 드롭다운 메뉴 */
  .sidebar-menu{
    display:none; width:100%;
    flex-direction:column;
    border-top:1px solid var(--border);
    background:var(--surface);
    padding:8px 0 10px;
  }
  .sidebar-menu.open{ display:flex; }
  .sidebar-footer{ margin-top:0; border-top:none; padding:6px 10px 4px; }
  .sidebar-trend-menu{ border-top:1px solid var(--border); padding:4px 0; }
  .nav-label{ padding:8px 16px 4px; }

  /* 메인: 상단 헤더 높이만큼 내림 */
  .main{
    margin-left:0;
    padding:14px 14px 60px;
    margin-top:54px;
    max-width:100vw;
  }

  /* 그리드 1열 */
  .kpi-grid{ grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px; }
  .g2,.g3{ grid-template-columns:1fr; gap:10px; }
  .trend-kpi-row{ grid-template-columns:repeat(2,1fr); gap:8px; }

  /* KPI 카드 */
  .kpi{ padding:12px 14px; }
  .kpi-value{ font-size:22px; }

  /* 카드 패딩 */
  .card{ padding:14px 14px; }
  .insight-card{ padding:16px 16px; }

  /* 차트 높이 줄임 */
  .chart-daily{ height:200px !important; }
  .chart-sm{ height:160px !important; }
  .chart-md{ height:200px !important; }

  /* 모달 */
  .overlay{ padding-top:10px; padding-left:6px; padding-right:6px; }
  .modal{ padding:20px 16px; width:100%; }
  .fg2,.fg3{ grid-template-columns:1fr; }
  .daily-grid{ grid-template-columns:repeat(7,1fr); gap:3px; }
  .daily-cell input{ font-size:10px; padding:4px 2px; }

  /* 페이지 타이틀 */
  .page-title{ font-size:16px; }
  .page-meta{ font-size:12px; gap:5px; }
  .page-header{ margin-bottom:14px; }

  /* 테이블 */
  .tbl{ font-size:12px; }
  .tbl th,.tbl td{ padding:6px 7px; }

  /* 도넛 차트 */
  .donut-wrap{ flex-direction:column; align-items:flex-start; gap:10px; }
  .donut-canvas canvas{ width:120px !important; height:120px !important; }

  /* 인사이트 */
  .insight-body strong{ font-size:12px; }
  .insight-body span{ font-size:11px; }
}

/* 소형 모바일 (400px 이하) */
@media(max-width:400px){
  .kpi-grid{ grid-template-columns:1fr 1fr; }
  .kpi-value{ font-size:19px; }
  .daily-grid{ grid-template-columns:repeat(4,1fr); }
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">
    <div class="logo-mark">
      <div class="logo-icon"><i class="ti ti-chart-bar"></i></div>
      <span class="logo-name">소프트힐스</span>
    </div>
    <div class="logo-sub">홈페이지 방문 유입 현황</div>
  </div>
  <!-- 햄버거 버튼 (모바일만 표시) -->
  <button class="sidebar-hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()" style="display:none">
    <i class="ti ti-menu-2" id="hamburgerIcon"></i>
  </button>
  <!-- 메뉴 영역 (데스크톱: 항상 표시 / 모바일: 토글) -->
  <div class="sidebar-menu" id="sidebarMenu">
    <div class="nav-label">월별 리포트</div>
    <div id="navList"></div>
    <div class="sidebar-trend-menu">
      <div class="nav-label">방문자 추이</div>
      <div class="nav-item" id="navTrend" onclick="showTrendPage()">
        <i class="ti ti-trending-up"></i>방문자 추이 그래프
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="add-btn" onclick="openModal()"><i class="ti ti-plus"></i> 새 월 데이터 추가</button>
    </div>
  </div>
</nav>

<main class="main"><div id="pageContent"></div></main>


<!-- Modal -->
<div class="overlay" id="addModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">새 월 데이터 추가</div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div id="editBanner" style="display:none" class="edit-banner">
      <i class="ti ti-pencil" style="font-size:14px;flex-shrink:0"></i>
      <span id="editBannerText"></span>
    </div>
    <div class="fsec">기본 정보</div>
    <div class="fg3" style="margin-bottom:10px">
      <div class="fgroup">
        <label class="flabel">연도 선택</label>
        <select class="finput" id="f-year" onchange="onYearMonthChange()">
          <option value="">연도</option>
        </select>
      </div>
      <div class="fgroup">
        <label class="flabel">월 선택</label>
        <select class="finput" id="f-month" onchange="onYearMonthChange()">
          <option value="">월</option>
          <option value="1">1월</option>
          <option value="2">2월</option>
          <option value="3">3월</option>
          <option value="4">4월</option>
          <option value="5">5월</option>
          <option value="6">6월</option>
          <option value="7">7월</option>
          <option value="8">8월</option>
          <option value="9">9월</option>
          <option value="10">10월</option>
          <option value="11">11월</option>
          <option value="12">12월</option>
        </select>
      </div>
      <div class="fgroup">
        <label class="flabel">영업일</label>

<script>
'use strict';

/* ══════════════════════════════════════
   설정
══════════════════════════════════════ */
const SHEET_API = 'https://script.google.com/macros/s/AKfycbxTMqWv629a-6_dFyUzN66pqdksh3RxTopWcTQpKy8HAjUtBpGRGvpCT-BMmBqSJIn-/exec';

/* ══════════════════════════════════════
   DB (시트에서 로드)
══════════════════════════════════════ */
let DB = {};

// 시트 행 → DB 엔트리
function rowToDB(r) {
  // GAS가 이미 배열로 파싱해서 보내는 경우와 문자열로 오는 경우 모두 처리
  const arr = f => {
    if (Array.isArray(f)) return f;
    try { const p = JSON.parse(f || '[]'); return Array.isArray(p) ? p : []; }
    catch(e) { return []; }
  };
  return {
    label:   String(r.label || ''),
    year:    +r.year  || 0,
    month:   +r.month || 0,
    period:  String(r.period  || ''),
    bizDays: +r.bizDays || 0,
    total:   +r.total || 0,
    seo:     +r.seo   || 0,
    os: {
      windows: +r.win     || 0,
      mac:     +r.mac     || 0,
      android: +r.android || 0,
      ios:     +r.ios     || 0,
      linux:   +r.linux   || 0,
      unknown: +r.unknown || 0,
    },
    daily: {
      dates: arr(r.daily_dates).map(Number),
      days:  arr(r.daily_days).map(String),
      v:     arr(r.daily_v).map(Number),
    },
    pages: arr(r.pages_json).map(p => ({
      g:    String(p.g    || 'crm'),
      name: String(p.name || ''),
      v:    +p.v || 0,
    })),
  };
}

// DB 엔트리 → 시트 저장 payload
function dbToPayload(key) {
  const d = DB[key];
  return {
    key,
    label: d.label, year: d.year, month: d.month,
    period: d.period, bizDays: d.bizDays,
    total: d.total, prevTotal: prevOf(key)?.total||0,
    seo: d.seo,     prevSeo:   prevOf(key)?.seo||0,
    win: d.os.windows, mac: d.os.mac, android: d.os.android,
    ios: d.os.ios,     linux: d.os.linux, unknown: d.os.unknown,
    daily_dates: d.daily.dates,
    daily_days:  d.daily.days,
    daily_v:     d.daily.v,
    pages_json:  d.pages,
  };
}

// 직전 월 DB 엔트리 반환 (없으면 null)
function prevOf(key) {
  const normKey = normalizeKey(key);
  const keys = sortedKeys();
  const idx  = keys.indexOf(normKey);
  return idx > 0 ? DB[keys[idx-1]] : null;
}

/* ══════════════════════════════════════
   시트 I/O
══════════════════════════════════════ */
// 구글 시트가 "2026-03"을 날짜로 자동변환 → GAS가 Date 직렬화 문자열로 보내는 경우 대비
// key를 항상 "YYYY-MM" 형식으로 정규화
function normalizeKey(rawKey) {
  if (!rawKey) return null;
  const s = String(rawKey).trim();
  // 이미 YYYY-MM 형식이면 그대로
  if (/^\d{4}-\d{2}$/.test(s)) return s;
  // Date 파싱 시도 (예: "Sun Mar 01 2026 09:00:00 GMT+0900" 등)
  const d = new Date(s);
  if (!isNaN(d.getTime())) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    return y + '-' + m;
  }
  return s;
}

async function loadFromSheet() {
  const res  = await fetch(SHEET_API + '?action=read');
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || '읽기 실패');
  // key를 YYYY-MM 형식으로 정규화 후 오름차순 정렬 → DB 삽입
  const entries = Object.entries(json.data)
    .map(([k, r]) => [normalizeKey(k), r])
    .filter(([k]) => k)
    .sort((a, b) => a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0);
  DB = {};
  entries.forEach(([k, r]) => {
    const entry = rowToDB(r);
    entry._key = k; // key를 entry 내부에도 저장 (디버그용)
    DB[k] = entry;
  });
  if (!Object.keys(DB).length) throw new Error('시트에 데이터가 없습니다');
}

async function saveToSheet(key) {
  try {
    const res  = await fetch(SHEET_API, {
      method: 'POST', headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(dbToPayload(key)),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || '저장 실패');
    showToast('✓ ' + DB[key].label + ' 저장 완료');
  } catch(e) { showToast('저장 실패: ' + e.message, true); }
}

async function deleteFromSheet(key) {
  try {
    const res  = await fetch(SHEET_API, {
      method: 'POST', headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'delete', key }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || '삭제 실패');
  } catch(e) { showToast('시트 삭제 실패: ' + e.message, true); }
}

/* ══════════════════════════════════════
   유틸
══════════════════════════════════════ */
const comma   = v => Number(v).toLocaleString();
const K       = v => v >= 1000 ? (v/1000).toFixed(0) + 'K' : v;
const pct     = (a,b) => b > 0 ? ((a-b)/b*100).toFixed(1) : null;
const gv      = id => { const e = document.getElementById(id); return e ? (parseInt(e.value)||0) : 0; };
const sv      = (id,v) => { const e = document.getElementById(id); if(e) e.value = (v!==undefined&&v!==null)?v:''; };

function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function dayName(y,m,d){ return ['일','월','화','수','목','금','토'][new Date(y,m-1,d).getDay()]; }

// key 오름차순 — 'YYYY-MM' 형식이므로 문자열 정렬 = 날짜 정렬
// 저장/삭제 후 DB에 key가 추가될 수 있으므로 매번 정렬해서 반환
function sortedKeys(){
  return Object.keys(DB).sort((a, b) => a < b ? -1 : a > b ? 1 : 0);
}

// DB에 새 key 추가/수정 후 항상 정렬된 순서로 재삽입
function reorderDB() {
  const sorted = sortedKeys();
  const tmp = {};
  sorted.forEach(k => { tmp[k] = DB[k]; });
  DB = tmp;
}

/* ══════════════════════════════════════
   차트
══════════════════════════════════════ */
// chartjs-plugin-datalabels 전역 등록
Chart.register(ChartDataLabels);
// 기본값: 모든 차트에서 datalabels 비활성화 (각 차트에서 명시적으로 활성화)
Chart.defaults.plugins.datalabels.display = false;

const CHARTS = {};
function regChart(id, c){ CHARTS[id] = c; }
function clearCharts(){ Object.values(CHARTS).forEach(c=>{ try{c.destroy();}catch(e){} }); for(const k in CHARTS) delete CHARTS[k]; }

const OS_KEYS   = ['windows','mac','android','ios','linux','unknown'];
const OS_LABELS = ['Windows','Macintosh','Android','iOS','Linux','Unknown'];
const OS_COLORS = ['#2b7cd3','#d4537e','#7f77dd','#ef9f27','#1D9E75','#b4b2a9'];

/* ══════════════════════════════════════
   내비게이션
══════════════════════════════════════ */
let currentKey = null;

function buildNav() {
  const el = document.getElementById('navList');
  if (!el) return;
  reorderDB(); // 항상 key 오름차순으로 DB 재정렬 후 렌더링
  const keys    = sortedKeys();          // 2026-03 → 04 → 05
  const latest  = keys[keys.length - 1];
  const navKeys = [...keys].reverse();   // 사이드바: 5월→4월→3월 (최신이 위)
  el.innerHTML  = navKeys.map(k => `
    <div class="nav-item ${currentKey===k?'active':''}" onclick="showPage('${k}')">
      <i class="ti ti-calendar-month"></i>${DB[k].label}
      ${k===latest?'<span class="nav-dot"></span>':''}
    </div>`).join('');
}

function showPage(key) {
  currentKey = normalizeKey(key) || key;
  var nt = document.getElementById('navTrend');
  if (nt) nt.classList.remove('active');
  closeMobileMenu();
  buildNav();
  clearCharts();
  document.getElementById('pageContent').innerHTML = '';
  renderMonth(key);
}

/* ══════════════════════════════════════
   월별 리포트
══════════════════════════════════════ */
function renderMonth(key) {
  const d    = DB[key];
  const prev = prevOf(key);   // 직전 월 (DB live 기준)
  const gPct = pct(d.total, prev?.total||0);
  const avgD = d.bizDays > 0 ? Math.round(d.total / d.bizDays) : 0;
  const peak = d.daily.v.length ? Math.max(...d.daily.v) : 0;
  const peakDay = d.daily.dates[d.daily.v.indexOf(peak)];
  const seoPct  = prev?.seo > 0 && d.seo > 0 ? (d.seo / prev.seo).toFixed(2) : null;
  const osTotal = OS_KEYS.reduce((s,k) => s + (d.os[k]||0), 0);

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <div class="page-title">${d.label} 방문자 분석</div>
      <div class="page-meta">
        <i class="ti ti-calendar" style="font-size:13px;opacity:.5"></i>${d.period}
        <span class="meta-sep">·</span>영업일 ${d.bizDays}일
        <button onclick="openModal('${key}')" style="margin-left:auto;display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--surface);border:1px solid var(--border-med);border-radius:7px;font-size:12px;color:var(--text-secondary);cursor:pointer" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='var(--surface)'">
          <i class="ti ti-pencil" style="font-size:13px"></i> 데이터 수정
        </button>
        <button onclick="deleteMonth('${key}')" style="display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--surface);border:1px solid var(--border-med);border-radius:7px;font-size:12px;color:var(--red);cursor:pointer" onmouseover="this.style.background='var(--red-light)'" onmouseout="this.style.background='var(--surface)'">
          <i class="ti ti-trash" style="font-size:13px"></i> 삭제
        </button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi blue">
        <div class="kpi-label"><i class="ti ti-users"></i>총 방문자</div>
        <div class="kpi-value">${comma(d.total)}</div>
        ${gPct !== null
          ? `<div class="kpi-sub ${+gPct>=0?'up':'dn'}"><i class="ti ti-arrow-${+gPct>=0?'up':'down'}"></i>전월 대비 ${+gPct>=0?'+':''}${gPct}%</div>`
          : `<div class="kpi-sub muted">전월 데이터 없음</div>`}
      </div>
      <div class="kpi green">
        <div class="kpi-label"><i class="ti ti-calendar-stats"></i>일 평균 방문</div>
        <div class="kpi-value">${comma(avgD)}</div>
        <div class="kpi-sub muted">영업일 ${d.bizDays}일 기준</div>
      </div>
      <div class="kpi amber">
        <div class="kpi-label"><i class="ti ti-flame"></i>피크 방문일</div>
        <div class="kpi-value">${comma(peak)}</div>
        <div class="kpi-sub muted">${d.month}월 ${peakDay}일 (${dayName(d.year,d.month,peakDay)}요일)</div>
      </div>
      <div class="kpi purple">
        <div class="kpi-label"><i class="ti ti-search"></i>네이버 SEO 지수</div>
        <div class="kpi-value">${d.seo > 0 ? comma(d.seo) : '<span style="font-size:16px;color:var(--text-muted)">미수집</span>'}</div>
        ${seoPct ? `<div class="kpi-sub up"><i class="ti ti-arrow-up"></i>전월 대비 ×${seoPct}</div>` : '<div class="kpi-sub muted">-</div>'}
      </div>
    </div>

    <div class="g3">
      <div class="card">
        <div class="card-head">
          <div class="card-title"><i class="ti ti-chart-bar"></i>일별 방문자 수</div>
          <div class="card-note">
            <span><span style="display:inline-block;width:8px;height:8px;background:#2b7cd3;border-radius:2px;vertical-align:middle"></span> 평일</span>
            <span><span style="display:inline-block;width:8px;height:8px;background:#4fa8e8;border-radius:2px;vertical-align:middle"></span> 토</span>
            <span><span style="display:inline-block;width:8px;height:8px;background:#e05252;border-radius:2px;vertical-align:middle"></span> 일</span>
            <span><span style="display:inline-block;width:12px;height:2px;background:#ef9f27;vertical-align:middle;border-radius:1px"></span> 평균</span>
          </div>
        </div>
        <div style="position:relative;width:100%;height:240px"><canvas id="cDaily"></canvas></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title"><i class="ti ti-devices"></i>접속 OS 분포</div></div>
        <div class="donut-wrap">
          <div class="donut-canvas" style="width:140px;height:140px">
            <canvas id="cOs" width="140" height="140"></canvas>
            <div class="donut-center">
              <div class="donut-center-val">${comma(osTotal)}</div>
              <div class="donut-center-lbl">총 접속</div>
            </div>
          </div>
          <div class="donut-legend" id="osLegend"></div>
        </div>
      </div>
    </div>

    ${prev ? `
    <div class="g2">
      <div class="card">
        <div class="card-head">
          <div class="card-title"><i class="ti ti-arrows-exchange"></i>OS 전월 비교</div>
          <div class="legend"><span><span class="ldot" style="background:#2b7cd3"></span>${prev.label}</span><span><span class="ldot" style="background:#1D9E75"></span>${d.label}</span></div>
        </div>
        <div style="position:relative;width:100%;height:200px"><canvas id="cOsComp"></canvas></div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-title"><i class="ti ti-clipboard-data"></i>총 방문자 비교</div>
          <div class="legend"><span><span class="ldot" style="background:#2b7cd3"></span>${prev.label}</span><span><span class="ldot" style="background:#1D9E75"></span>${d.label}</span></div>
        </div>
        <div style="position:relative;width:100%;height:200px"><canvas id="cKpi"></canvas></div>
      </div>
    </div>` : ''}

    <div class="card g1">
      <div class="card-head">
        <div class="card-title"><i class="ti ti-link"></i>유입 페이지별 현황</div>
        <div class="tabs" id="pageTabs">
          <button class="tab active" onclick="switchTab('all',this,'${key}')">전체</button>
          <button class="tab" onclick="switchTab('ad',this,'${key}')">광고홍보</button>
          <button class="tab" onclick="switchTab('crm',this,'${key}')">CRM</button>
        </div>
      </div>
      <table class="tbl">
        <thead><tr>
          <th style="width:70px">구분</th><th>페이지</th>
          <th style="text-align:right">방문 수</th>
          ${prev ? `<th style="text-align:right">전월 (${prev.label})</th><th style="text-align:right;width:80px">증감</th><th style="width:30px"></th>` : ''}
        </tr></thead>
        <tbody id="pageTbody"></tbody>
      </table>
    </div>

    <div class="card g1">
      <div class="card-head">
        <div class="card-title"><i class="ti ti-chart-bar"></i>유입 페이지 비교 (전월 vs 이번 달)</div>
        ${prev ? `<div class="legend"><span><span class="ldot" style="background:#2b7cd3"></span>${prev.label}</span><span><span class="ldot" style="background:#1D9E75"></span>${d.label}</span></div>` : ''}
      </div>
      <div style="position:relative;width:100%;height:270px"><canvas id="cPageBar"></canvas></div>
    </div>

    <div class="insight-card" id="insightCard">
      <div class="insight-head">
        <div class="insight-title">
          <i class="ti ti-bulb"></i>AI 분석 인사이트 &mdash; ${d.label}
        </div>
        <button class="insight-refresh" id="insightRefreshBtn" onclick="generateInsight('${key}', true)">
          <i class="ti ti-refresh"></i>새로고침
        </button>
      </div>
      <div id="insightBody">
        <div class="insight-skeleton">
          ${[1,2,3,4,5].map(()=>'<div class="insight-skel-row"><div class="insight-skel-num"></div><div class="insight-skel-body"><div class="insight-skel-title"></div><div class="insight-skel-desc"></div></div></div>').join('')}
        </div>
      </div>
    </div>`;

  // 차트 그리기
  drawDaily(d, avgD);
  drawOsDonut(d, osTotal);
  if (prev) { drawOsComp(d, prev); drawKpiComp(d, prev); }
  renderPageTable(key, 'all', prev);
  drawPageBar(d, prev);
  // AI 인사이트 자동 생성 (페이지 렌더 후 바로 실행)
  generateInsight(key, false);
}

/* ══════════════════════════════════════
   데이터 기반 인사이트 자동 생성
══════════════════════════════════════ */
const _insightCache = {};

function generateInsight(key, forceRefresh) {
  const d    = DB[key];
  const prev = prevOf(key);
  if (!d) return;

  if (!forceRefresh && _insightCache[key]) {
    renderInsight(_insightCache[key]);
    return;
  }

  const insights = buildInsights(d, prev);
  _insightCache[key] = insights;
  renderInsight(insights);
}

function buildInsights(d, prev) {
  const insights = [];
  const avgD     = d.bizDays > 0 ? Math.round(d.total / d.bizDays) : 0;
  const osTotal  = ['windows','mac','android','ios','linux','unknown'].reduce((s,k) => s + (d.os[k]||0), 0);
  const mobile   = (d.os.android||0) + (d.os.ios||0);
  const mobilePct = osTotal > 0 ? Math.round(mobile / osTotal * 100) : 0;
  const sortedPages = [...d.pages].sort((a,b) => b.v - a.v);
  const topPage  = sortedPages[0];
  const adPages  = d.pages.filter(p => p.g === 'ad');
  const crmPages = d.pages.filter(p => p.g === 'crm');
  const adTotal  = adPages.reduce((s,p) => s + p.v, 0);
  const crmTotal = crmPages.reduce((s,p) => s + p.v, 0);
  const peak     = d.daily.v.length ? Math.max(...d.daily.v) : 0;
  const peakIdx  = d.daily.v.indexOf(peak);
  const peakDay  = d.daily.dates[peakIdx] || '-';
  const peakDayNm= d.daily.days[peakIdx]  || '';

  // 1. 총 방문자 전월 비교
  if (prev && prev.total > 0) {
    const diff = d.total - prev.total;
    const pct  = ((diff / prev.total) * 100).toFixed(1);
    const up   = diff >= 0;
    insights.push({
      tag:   up ? 'pos' : 'neg',
      title: up
        ? `전월 대비 방문자 ${pct}% 증가`
        : `전월 대비 방문자 ${Math.abs(pct)}% 감소`,
      desc:  `${prev.label} ${comma(prev.total)}명 → ${d.label} ${comma(d.total)}명 (${up ? '+' : ''}${comma(diff)}명), 일평균 ${comma(avgD)}명 수준.`,
    });
  } else {
    insights.push({
      tag:   'neu',
      title: `이번 달 총 방문자 ${comma(d.total)}명`,
      desc:  `영업일 ${d.bizDays}일 기준 일평균 ${comma(avgD)}명 방문. 전월 비교 데이터 없음.`,
    });
  }

  // 2. SEO 지수 변화
  if (prev && prev.seo > 0 && d.seo > 0) {
    const seoDiff = d.seo - prev.seo;
    const seoPct  = ((seoDiff / prev.seo) * 100).toFixed(1);
    const up      = seoDiff >= 0;
    insights.push({
      tag:   up ? 'pos' : 'neg',
      title: up
        ? `네이버 SEO 지수 ${seoPct}% 상승`
        : `네이버 SEO 지수 ${Math.abs(seoPct)}% 하락`,
      desc:  `전월 ${comma(prev.seo)} → 이번 달 ${comma(d.seo)}으로 ${up ? '개선' : '하락'}. ${up ? '검색 유입 확대 추세로 콘텐츠 전략 유효.' : '검색 노출 점검 및 키워드 보강이 필요한 시점.'}`,
    });
  } else if (d.seo > 0) {
    insights.push({
      tag:   'neu',
      title: `네이버 SEO 지수 ${comma(d.seo)}`,
      desc:  `이번 달 SEO 지수 ${comma(d.seo)} 기록. 지속적인 콘텐츠 최적화로 검색 노출 확대 필요.`,
    });
  }

  // 3. 모바일 접속 비율
  if (osTotal > 0) {
    const pcPct = 100 - mobilePct;
    insights.push({
      tag:   mobilePct >= 40 ? 'warn' : 'neu',
      title: `모바일 접속 비율 ${mobilePct}%`,
      desc:  `전체 ${comma(osTotal)}명 중 모바일(Android+iOS) ${comma(mobile)}명(${mobilePct}%), PC ${pcPct}%. ${mobilePct >= 40 ? '모바일 UX 최적화가 전환율에 직결.' : 'PC 중심 접속으로 B2B 탐색 패턴 확인.'}`,
    });
  }

  // 4. 최다 방문 페이지 & CRM 유입
  if (topPage) {
    const crmTop = [...crmPages].sort((a,b) => b.v - a.v)[0];
    insights.push({
      tag:   'pos',
      title: `'${topPage.name}' 최다 유입 ${comma(topPage.v)}회`,
      desc:  `광고홍보 ${comma(adTotal)}회 / CRM ${comma(crmTotal)}회 유입.${crmTop ? ` CRM 최다는 '${crmTop.name}'(${comma(crmTop.v)}회)로 제품 관심도 반영.` : ''}`,
    });
  }

  // 5. 피크일 & 주간 패턴
  if (peak > 0 && avgD > 0) {
    const ratio  = (peak / avgD).toFixed(1);
    const weCount = d.daily.days.filter(x => x === '토' || x === '일').length;
    const weV    = d.daily.v.filter((_,i) => d.daily.days[i]==='토'||d.daily.days[i]==='일');
    const weAvg  = weCount > 0 ? Math.round(weV.reduce((s,v)=>s+v,0)/weCount) : 0;
    const wdAvg  = d.bizDays > 0
      ? Math.round((d.daily.v.reduce((s,v)=>s+v,0) - weV.reduce((s,v)=>s+v,0)) / d.bizDays)
      : 0;
    insights.push({
      tag:   'neu',
      title: `피크일 ${d.month}/${peakDay}(${peakDayNm}) ${comma(peak)}명`,
      desc:  `일평균 대비 ${ratio}배 수준. 평일 평균 ${comma(wdAvg)}명 vs 주말 평균 ${comma(weAvg)}명으로 ${wdAvg > weAvg ? '평일 중심' : '주말 접속'} 패턴.`,
    });
  }

  return insights.slice(0, 5);
}

function renderInsight(insights) {
  if (!insights?.length) return;
  // tag: pos=녹색, neg=적색, warn=주황, neu=파랑
  const tagClass = { pos:'n3', neg:'n5', warn:'n4', neu:'n1' };
  const numLabels = ['①','②','③','④','⑤'];
  document.getElementById('insightBody').innerHTML = `
    <div class="insight-list">
      ${insights.map((it, i) => `
        <div class="insight-item">
          <div class="insight-num ${tagClass[it.tag]||'n1'}">${numLabels[i]||i+1}</div>
          <div class="insight-body">
            <strong>${it.title}</strong>
            <span>${it.desc}</span>
          </div>
        </div>`).join('')}
    </div>`;
}

let _editKey = null;

function openModal(editKey) {
  _editKey = editKey || null;
  const isEdit = !!_editKey;
  const d = isEdit ? DB[_editKey] : null;

  // 제목 & 배너
  document.getElementById('modalTitle').textContent = isEdit ? d.label + ' 데이터 수정' : '새 월 데이터 추가';
  const banner = document.getElementById('editBanner');
  if (isEdit) {
    banner.style.display = 'flex';
    document.getElementById('editBannerText').textContent = d.label + ' 데이터를 수정합니다.';
  } else {
    banner.style.display = 'none';
  }

  // 연도 옵션 동적 생성 (현재 연도 ±3년)
  var yearSel = document.getElementById('f-year');
  yearSel.innerHTML = '<option value="">연도</option>';
  for (var yi = 2024; yi <= 2035; yi++) {
    var opt = document.createElement('option');
    opt.value = yi;
    opt.textContent = yi + '년';
    yearSel.appendChild(opt);
  }

  // 기본 정보
  if (isEdit) {
    document.getElementById('f-year').value  = d.year;
    document.getElementById('f-month').value = d.month;
    sv('f-bdays', d.bizDays); sv('f-total', d.total); sv('f-seo', d.seo);
  } else {
    // 신규: 최신 DB 기준 다음 달 연/월 자동 추천
    var suggested = suggestNextYearMonth();
    document.getElementById('f-year').value  = suggested.year;
    document.getElementById('f-month').value = suggested.month;
    sv('f-bdays',''); sv('f-total',''); sv('f-seo','');
  }

  // OS
  const os = isEdit ? d.os : {};
  sv('f-win',  os.windows||''); sv('f-mac',  os.mac||'');
  sv('f-and',  os.android||''); sv('f-ios',  os.ios||'');
  sv('f-linux',os.linux||'');   sv('f-unk',  os.unknown||'');

  // 페이지
  const pv = name => isEdit ? (d.pages.find(p=>p.name===name)?.v||'') : '';
  sv('p-main',  pv('메인페이지'));    sv('p-hist', pv('연혁'));
  sv('p-news',  pv('뉴스'));          sv('p-about',pv('회사소개'));
  sv('p-prod',  pv('자사 제품소개')); sv('p-cart', pv('장바구니'));
  sv('p-signup',pv('회원가입'));       sv('p-plist',pv('제품목록'));
  sv('p-pdet',  pv('제품상세'));       sv('p-psup', pv('제품지원'));
  sv('p-qna',   pv('1:1 문의'));       sv('p-faq',  pv('FAQ'));
  sv('p-sys',   pv('시스템 요구사항'));

  // 일별 그리드
  const mon = isEdit ? d.month : +document.getElementById('f-month').value;
  const yr  = isEdit ? d.year  : (+document.getElementById('f-year').value || new Date().getFullYear());
  if (mon && yr) buildDailyGrid(yr, mon);
  if (isEdit) {
    d.daily.dates.forEach((day,i) => { const el=document.getElementById('dd-'+day); if(el) el.value=d.daily.v[i]||''; });
  }

  document.getElementById('addModal').classList.add('open');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('open');
  _editKey = null;
}

/* ── 다음 달 연/월 자동 추천 ── */
function suggestNextYearMonth() {
  const keys = sortedKeys();
  if (!keys.length) {
    const now = new Date();
    return { year: now.getFullYear(), month: now.getMonth() + 1 };
  }
  const lastKey = keys[keys.length - 1];
  const [lastY, lastM] = lastKey.split('-').map(Number);
  if (lastM === 12) return { year: lastY + 1, month: 1 };
  return { year: lastY, month: lastM + 1 };
}

function onYearMonthChange() {
  if (_editKey) return;
  const year  = +document.getElementById('f-year').value;
  const month = +document.getElementById('f-month').value;
  if (year && month) buildDailyGrid(year, month);
}

function buildDailyGrid(y, m) {
  if (!y||!m||m<1||m>12) return;
  const days = daysInMonth(y,m);
  let html = '';
  for (let i=1; i<=days; i++) {
    const dn=dayName(y,m,i), isWe=dn==='토'||dn==='일';
    html += `<div class="daily-cell">
      <label style="color:${isWe?'#c0392b':'var(--text-muted)'}">${i}<br>(${dn})</label>
      <input type="number" id="dd-${i}" min="0" placeholder="0" class="finput${isWe?' we':''}">
    </div>`;
  }
  document.getElementById('dailyInputGrid').innerHTML = html;
}

/* ── 저장 ── */
function saveMonth() {
  const month = +document.getElementById('f-month').value;
  const total = gv('f-total');
  if (!month) { alert('월을 선택해주세요.'); return; }
  if (!total) { alert('총 방문자 수를 입력해주세요.'); return; }

  // 연도 자동 결정
  const year = _editKey ? DB[_editKey].year : getYearForMonth(month);

  const key  = `${finalYear}-${String(month).padStart(2,'0')}`;
  const mnm  = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const days = daysInMonth(finalYear, month);

  // 편집 모드에서 연도/월이 바뀌었으면 기존 key 삭제
  if (_editKey && _editKey !== key) {
    delete DB[_editKey];
    deleteFromSheet(_editKey);
  }

  // 마지막 유효 일 (일별 v 중 마지막 0 초과 날)
  const allV = Array.from({length:days}, (_,i) => gv(`dd-${i+1}`));
  const lastNonZero = allV.map((v,i)=>v>0?i+1:0).filter(Boolean).pop() || days;
  const mm = String(month).padStart(2,'0');

  DB[key] = {
    label:   `${String(finalYear).slice(2)}년 ${mnm[month-1]}`,
    year: finalYear, month,
    period:  `${finalYear}.${mm}.01 ~ ${mm}.${String(lastNonZero).padStart(2,'0')}`,
    bizDays: gv('f-bdays'),
    total, seo: gv('f-seo'),
    os: { windows:gv('f-win'), mac:gv('f-mac'), android:gv('f-and'),
          ios:gv('f-ios'), linux:gv('f-linux'), unknown:gv('f-unk') },
    daily: {
      dates: Array.from({length:lastNonZero}, (_,i)=>i+1),
      days:  Array.from({length:lastNonZero}, (_,i)=>dayName(finalYear,month,i+1)),
      v:     allV.slice(0, lastNonZero),
    },
    pages: [
      {g:'ad', name:'메인페이지',     v:gv('p-main')},
      {g:'ad', name:'연혁',           v:gv('p-hist')},
      {g:'ad', name:'뉴스',           v:gv('p-news')},
      {g:'ad', name:'회사소개',       v:gv('p-about')},
      {g:'ad', name:'자사 제품소개',  v:gv('p-prod')},
      {g:'crm',name:'장바구니',       v:gv('p-cart')},
      {g:'crm',name:'회원가입',       v:gv('p-signup')},
      {g:'crm',name:'제품목록',       v:gv('p-plist')},
      {g:'crm',name:'제품상세',       v:gv('p-pdet')},
      {g:'crm',name:'제품지원',       v:gv('p-psup')},
      {g:'crm',name:'1:1 문의',       v:gv('p-qna')},
      {g:'crm',name:'FAQ',            v:gv('p-faq')},
      {g:'crm',name:'시스템 요구사항',v:gv('p-sys')},
    ],
  };

  // DB 저장 후 key 오름차순으로 재정렬 — 사이드바 순서 보장
  reorderDB();
  closeModal();
  showPage(key);
  saveToSheet(key);
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#c0392b' : '#1a1a18';
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), isError?5000:3000);
}

/* ══════════════════════════════════════
   방문자 추이 섹션
══════════════════════════════════════ */
const FIXED_TREND = [
  { key:'2025-07', label:'25년 7월',  total:109   },
  { key:'2025-08', label:'25년 8월',  total:9824  },
  { key:'2025-09', label:'25년 9월',  total:9722  },
  { key:'2025-10', label:'25년 10월', total:9134  },
  { key:'2025-11', label:'25년 11월', total:9801  },
  { key:'2025-12', label:'25년 12월', total:17983 },
  { key:'2026-01', label:'26년 1월',  total:12037 },
  { key:'2026-02', label:'26년 2월',  total:11137 },
];

let _trendChart = null;

function getTrendData() {
  var live = sortedKeys()
    .filter(function(k){ return k >= '2026-03'; })
    .map(function(k){ return { key:k, label:DB[k].label, total:DB[k].total }; });
  return FIXED_TREND.concat(live);
}

function showTrendPage() {
  closeMobileMenu();
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  var nt = document.getElementById('navTrend');
  if (nt) nt.classList.add('active');
  currentKey = null;

  var data    = getTrendData();
  var fixLen  = FIXED_TREND.length;
  var labels  = data.map(function(d){ return d.label; });
  var vals    = data.map(function(d){ return d.total; });
  var lastIdx = vals.length - 1;

  // KPI 계산
  var totalAll = vals.reduce(function(s,v){ return s+v; }, 0);
  var liveVals = vals.slice(fixLen);
  var liveAvg  = liveVals.length
    ? Math.round(liveVals.reduce(function(s,v){return s+v;},0) / liveVals.length) : 0;
  var maxVal   = Math.max.apply(null, vals);
  var maxLabel = data[vals.indexOf(maxVal)].label;
  var gpct     = lastIdx > 0 && vals[lastIdx-1] > 0
    ? (((vals[lastIdx]-vals[lastIdx-1])/vals[lastIdx-1])*100).toFixed(1) : null;
  var gup      = gpct !== null && +gpct >= 0;

  // 페이지 HTML 렌더
  clearCharts();
  document.getElementById('pageContent').innerHTML =
    '<div class="page-header">' +
      '<div class="page-title">방문자 추이</div>' +
      '<div class="page-meta">방문자 추이 그래프' +
        '<span class="meta-sep">·</span>' +
        '<span style="display:inline-flex;align-items:center;gap:4px">' +
          '<span style="width:9px;height:9px;border-radius:2px;background:rgba(160,159,154,.6);display:inline-block"></span>고정 (25.07~26.02)' +
        '</span>' +
        '<span style="display:inline-flex;align-items:center;gap:4px">' +
          '<span style="width:9px;height:9px;border-radius:2px;background:#2b7cd3;display:inline-block"></span>실시간 (26.03~)' +
        '</span>' +
      '</div>' +
    '</div>' +

    '<div class="trend-kpi-row">' +
      '<div class="trend-kpi">' +
        '<div class="trend-kpi-label"><i class="ti ti-users" style="font-size:12px"></i> 누적 총 방문자</div>' +
        '<div class="trend-kpi-val">' + comma(totalAll) + '</div>' +
        '<div class="trend-kpi-sub">' + data[0].label + ' ~ ' + data[lastIdx].label + '</div>' +
      '</div>' +
      '<div class="trend-kpi">' +
        '<div class="trend-kpi-label"><i class="ti ti-crown" style="font-size:12px"></i> 최고 방문월</div>' +
        '<div class="trend-kpi-val" style="font-size:17px">' + maxLabel + '</div>' +
        '<div class="trend-kpi-sub" style="color:var(--blue)">' + comma(maxVal) + '명</div>' +
      '</div>' +
      '<div class="trend-kpi">' +
        '<div class="trend-kpi-label"><i class="ti ti-calendar-stats" style="font-size:12px"></i> 실시간 월평균</div>' +
        '<div class="trend-kpi-val">' + (liveVals.length ? comma(liveAvg) : '-') + '</div>' +
        '<div class="trend-kpi-sub">26년 3월 이후</div>' +
      '</div>' +
      '<div class="trend-kpi">' +
        '<div class="trend-kpi-label"><i class="ti ti-trending-up" style="font-size:12px"></i> 전월 대비</div>' +
        '<div class="trend-kpi-val" style="font-size:17px;color:' + (gpct!==null?(gup?'var(--green)':'var(--red)'):'var(--text-muted)') + '">' +
          (gpct !== null ? (gup?'▲':'▼') + Math.abs(gpct) + '%' : '-') +
        '</div>' +
        '<div class="trend-kpi-sub">' + data[lastIdx].label + ' 기준</div>' +
      '</div>' +
    '</div>' +

    '<div class="card g1">' +
      '<div class="card-head">' +
        '<div class="card-title"><i class="ti ti-chart-bar"></i>월별 방문자 추이</div>' +
        '<div style="font-size:11px;color:var(--text-muted)">총 ' + data.length + '개월</div>' +
      '</div>' +
      '<div style="position:relative;width:100%;height:340px"><canvas id="cTrend"></canvas></div>' +
    '</div>';

  // 차트 색상
  var barColors = data.map(function(_, i){
    return i < fixLen ? 'rgba(160,159,154,.55)' : 'rgba(43,124,211,.8)';
  });
  var ptColors = data.map(function(_, i){
    return i < fixLen ? '#a09f9a' : '#2b7cd3';
  });

  if (_trendChart) { try { _trendChart.destroy(); } catch(e){} _trendChart = null; }

  _trendChart = new Chart(document.getElementById('cTrend'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: '월 방문자',
          data: vals,
          backgroundColor: barColors,
          borderRadius: 4,
          barPercentage: .65,
          order: 2,
        },
        {
          type: 'line',
          label: '추이',
          data: vals,
          borderColor: '#2b7cd3',
          borderWidth: 2.5,
          pointRadius: 5,
          pointBackgroundColor: ptColors,
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          tension: .35,
          fill: false,
          order: 1,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: function(ctx){ return ctx[0].label; },
            label: function(ctx){
              var suffix = (ctx.datasetIndex === 0 && ctx.dataIndex >= fixLen) ? ' (실시간)' : '';
              return ' ' + comma(ctx.raw) + '명' + suffix;
            }
          }
        },
        datalabels: {
          display: function(ctx){ return ctx.datasetIndex === 0; },
          anchor: 'end', align: 'end',
          color: function(ctx){ return ctx.dataIndex < fixLen ? '#a09f9a' : '#2b7cd3'; },
          font: { size: 10, weight: '600' },
          formatter: function(v){ return comma(v); }
        }
      },
      scales: {
        x: {
          ticks: { font:{size:11}, color:'#a09f9a', maxRotation:35, autoSkip:false },
          grid:  { display: false }
        },
        y: {
          ticks: { font:{size:10}, color:'#a09f9a', callback: K },
          grid:  { color: 'rgba(0,0,0,.05)' },
          min: 0
        }
      }
    }
  });
}

// 이름 유지 (저장 후 갱신 호출용)
function renderTrendSection() { showTrendPage(); }

/* ══════════════════════════════════════
   모바일 메뉴 토글
══════════════════════════════════════ */
function initMobileNav() {
  var mq = window.matchMedia('(max-width:720px)');
  function onMQ(e) {
    var btn  = document.getElementById('hamburgerBtn');
    var menu = document.getElementById('sidebarMenu');
    if (e.matches) {
      // 모바일: 햄버거 표시, 메뉴 닫힌 상태
      btn.style.display  = 'flex';
      menu.classList.remove('open');
    } else {
      // 데스크톱: 햄버거 숨김, 메뉴 항상 표시
      btn.style.display  = 'none';
      menu.classList.add('open');
      menu.style.display = '';
    }
  }
  mq.addEventListener('change', onMQ);
  onMQ(mq);
}

function toggleMobileMenu() {
  var menu = document.getElementById('sidebarMenu');
  var icon = document.getElementById('hamburgerIcon');
  var open = menu.classList.toggle('open');
  icon.className = open ? 'ti ti-x' : 'ti ti-menu-2';
}

function closeMobileMenu() {
  var mq = window.matchMedia('(max-width:720px)');
  if (!mq.matches) return;
  var menu = document.getElementById('sidebarMenu');
  var icon = document.getElementById('hamburgerIcon');
  menu.classList.remove('open');
  icon.className = 'ti ti-menu-2';
}
